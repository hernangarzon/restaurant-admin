<div class="admin-container">

  <!-- Sidebar Moderno -->
  <aside class="sidebar">

    <!-- Header del Sidebar -->
    <div class="sidebar-header">
      <div class="logo-container">
        <div class="logo-icon">
          🍽️
        </div>
        <div>
          <h2 class="logo">Restaurant Admin</h2>
        </div>
      </div>

      <!-- Información del usuario -->
      <div class="user-info" *ngIf="username">
        <div class="user-avatar">
          👤
        </div>
        <div class="user-details">
          <span class="user-name">{{ username }}</span>
          <span class="user-role">Administrador</span>
        </div>
      </div>
    </div>

    <!-- Navegación -->
    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📊</span>
        <span class="nav-text">Dashboard</span>
      </a>

      <a routerLink="/admin/pedidos" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🧾</span>
        <span class="nav-text">Pedidos</span>
        <span class="badge-notif" *ngIf="mensajesNoLeidos > 0">{{ mensajesNoLeidos }}</span>
      </a>

      <a routerLink="/admin/menu-dia" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📅</span>
        <span class="nav-text">Menú del día</span>
      </a>

      <a routerLink="/admin/change-password" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🔑</span>
        <span class="nav-text">Cambiar contraseña</span>
      </a>
    </nav>

    <!-- Botón de Cerrar Sesión -->
    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-logout">
        <span class="btn-logout-icon">🚪</span>
        <span>Cerrar Sesión</span>
      </button>
    </div>

  </aside>

  <!-- Main content -->
  <main class="content">
    <router-outlet></router-outlet>
  </main>

  <div class="toast-notif" *ngIf="mostrarToast">
    {{ toastMensaje }}
  </div>

</div>
